[common]
framework = arduino
platform = espressif32
monitor_speed = 115200
monitor_flags =
    esp32_exception_decoder
    time
    colorize

lib_deps =
    h2zero/NimBLE-Arduino@^1.4.0

[env:esp32-c3]
extends = common
board = esp32-c3-devkitm-1
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

[env:esp32-s3]
extends = common
board = esp32-s3-devkitc-1
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
