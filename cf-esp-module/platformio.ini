[common]
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -std=gnu++17
build_unflags =
    -std=gnu++11
lib_deps =
    h2zero/NimBLE-Arduino@^1.4.0

[env:esp32-c3-devkitm-1]
extends = common
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200

[env:esp32-s3-devkitc-1]
extends = common
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
